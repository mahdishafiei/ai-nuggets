# TTS providers. API-only config for a deployment without the self-hosted
# Voxtral-on-Garibaldi HPC pipeline: Mistral API primary (cheap per char),
# ElevenLabs fallback. Run the daily pipeline with LEGACY_TTS=1 so TTS is
# done inline via gen_tts.py instead of the 3-phase Garibaldi path.
[tts.primary]
provider = "mistral"
model    = "voxtral-mini-tts-2603"
voice    = "en_paul_neutral"

[tts.fallback]
provider = "elevenlabs"
voice    = "hpp4J3VqNfWAUOO0d1Us"
model    = "eleven_flash_v2_5"

[tts.fallback.settings]
speed            = 1.1
stability        = 0.5
similarity_boost = 0.75
