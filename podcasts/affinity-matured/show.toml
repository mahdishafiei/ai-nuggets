# TTS providers — matches the upstream default: self-hosted Voxtral on
# Garibaldi HPC (primary) + Mistral API (fallback / gap-fill). See hpc/README.md
# for the one-time Garibaldi setup. Voxtral voices: neutral_male,
# neutral_female, casual_male, casual_female, cheerful_female (+ per-language).
[tts.primary]
provider = "voxtral"
model    = "mistralai/Voxtral-4B-TTS-2603"
voice    = "neutral_male"
speed    = 1.2

[tts.fallback]
provider = "mistral"
model    = "voxtral-mini-tts-2603"
voice    = "en_paul_neutral"
