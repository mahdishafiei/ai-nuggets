name = "podcast"
main = "src/index.ts"
compatibility_date = "2026-05-01"

[[d1_databases]]
binding = "DB"
database_name = "podcast"
# Replace with the database_id printed by `npx wrangler d1 create podcast`.
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[[analytics_engine_datasets]]
binding = "AE"
dataset = "podcast_requests"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "ai-nuggets-episodes"

[vars]
ALLOWED_PODCASTS = "affinity-matured"
