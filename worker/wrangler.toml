name = "podcast"
main = "src/index.ts"
compatibility_date = "2026-05-01"

[[d1_databases]]
binding = "DB"
database_name = "podcast"
database_id = "458dc35f-a6be-4c8d-95df-7e30229e02de"

[[analytics_engine_datasets]]
binding = "AE"
dataset = "podcast_requests"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "ai-nuggets-episodes"

[vars]
ALLOWED_PODCASTS = "biomedical-agentic-ai,calibr-briefing,justice-biotech-brief,receptor-and-reason,scripps-biomed-brief"
